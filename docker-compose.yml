services:
  api:
    build: .
    container_name: ai-cs-api
    ports:
      - "8000:8000"
    environment:
      # 데이터 계층은 Ncloud 관리형 서비스(Private Subnet). 값은 .env 에서 주입.
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      CLOVA_API_KEY: ${CLOVA_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}

  email-worker:
    build: .
    container_name: ai-cs-email-worker
    command: ["python", "-m", "app.email_worker"]
    environment:
      API_URL: http://api:8000/tickets
      SYNC_URL: http://api:8000/email/sync
      IMAP_HOST: imap.gmail.com
      IMAP_USER: ${IMAP_USER}
      IMAP_PASSWORD: ${IMAP_PASSWORD}
      POLL_INTERVAL: "30"
    depends_on:
      - api
