services:
  api:
    build: .
    container_name: ai-cs-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://ai_user:ai_password@postgres:5432/ai_cs
      REDIS_URL: redis://redis:6379/0
      CLOVA_API_KEY: nv-cc38dae84043477b89d4665f765c1c82VkZ7
      TELEGRAM_BOT_TOKEN: 8901565500:AAGbhAz4oS6QSDBVwVv5xFi1scXaSyfsLCA
      TELEGRAM_CHAT_ID: 8982015953
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    container_name: ai-cs-postgres
    environment:
      POSTGRES_DB: ai_cs
      POSTGRES_USER: ai_user
      POSTGRES_PASSWORD: ai_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  email-worker:
    build: .
    container_name: ai-cs-email-worker
    command: ["python", "-m", "app.email_worker"]
    environment:
      API_URL: http://api:8000/tickets
      IMAP_HOST: imap.gmail.com
      IMAP_USER: chohyerin03@gmail.com
      IMAP_PASSWORD: bltghozkvmijgssm
      POLL_INTERVAL: "30"
    depends_on:
      - api

  redis:
    image: redis:7
    container_name: ai-cs-redis
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
